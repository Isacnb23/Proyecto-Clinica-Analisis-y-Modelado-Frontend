<button
  mat-icon-button
  [matMenuTriggerFor]="notificationsMenu"
  matTooltip="Notificaciones"
  aria-label="Abrir notificaciones">
  <mat-icon
    [matBadge]="unreadCount"
    [matBadgeHidden]="unreadCount === 0"
    matBadgeColor="warn"
    matBadgeSize="small">
    {{ unreadCount > 0 ? 'notifications_active' : 'notifications' }}
  </mat-icon>
</button>

<mat-menu #notificationsMenu="matMenu" class="notifications-menu">

  <!-- Header -->
  <div class="notification-header" (click)="$event.stopPropagation()">
    <div>
      <strong>Notificaciones</strong>
      <div class="notification-subtitle">
        <span *ngIf="unreadCount > 0" class="badge-count">{{ unreadCount }} sin leer</span>
        <span *ngIf="unreadCount === 0" class="all-read">Todo al día ✓</span>
      </div>
    </div>
    <button mat-stroked-button class="btn-mark-all"
      *ngIf="unreadCount > 0"
      (click)="marcarTodas(); $event.stopPropagation()">
      <mat-icon>done_all</mat-icon> Marcar todas
    </button>
  </div>

  <mat-divider></mat-divider>

  <!-- Lista -->
  <ng-container *ngIf="notifications.length; else emptyState">
    <button
      mat-menu-item
      class="notification-item"
      *ngFor="let item of notifications"
      [class]="getItemClass(item)"
      [class.unread]="!item.leida"
      (click)="marcarLeida(item)"
      [attr.aria-label]="'Notificación: ' + item.titulo">

      <div class="notif-icon-wrap" [class]="getItemClass(item) + '-icon'">
        <mat-icon>{{ getIcon(item.tipo) }}</mat-icon>
      </div>

      <div class="notification-content">
        <div class="notification-title">
          {{ item.titulo }}
          <span *ngIf="!item.leida" class="unread-dot"></span>
        </div>
        <div class="notification-message">{{ item.mensaje }}</div>
        <div class="notification-time">{{ getTiempoRelativo(item.fechaCreacion) }}</div>
      </div>
    </button>
  </ng-container>

  <!-- Vacío -->
  <ng-template #emptyState>
    <div class="notification-empty">
      <mat-icon>notifications_none</mat-icon>
      <p>No hay notificaciones</p>
    </div>
  </ng-template>

</mat-menu>
