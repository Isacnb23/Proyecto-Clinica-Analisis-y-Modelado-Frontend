<button
  mat-icon-button
  [matMenuTriggerFor]="notificationsMenu"
  matTooltip="Notificaciones"
  aria-label="Abrir notificaciones">
  <mat-icon [matBadge]="unreadCount" matBadgeColor="warn">notifications</mat-icon>
</button>

<mat-menu #notificationsMenu="matMenu" class="notifications-menu">
  <div class="notification-header">
    <div>
      <strong>Notificaciones</strong>
      <div class="notification-subtitle">{{ unreadCount }} sin leer</div>
    </div>

    <button
      mat-button
      color="primary"
      (click)="marcarTodas(); $event.stopPropagation()"
      aria-label="Marcar todas las notificaciones como leídas">
      Marcar todas
    </button>
  </div>

  <mat-divider></mat-divider>

  <ng-container *ngIf="notifications.length; else emptyState">
    <button
      mat-menu-item
      class="notification-item"
      *ngFor="let item of notifications"
      (click)="marcarLeida(item)"
      [attr.aria-label]="'Notificación: ' + item.titulo">
      <mat-icon>{{ getIcon(item.tipo) }}</mat-icon>

      <div class="notification-content">
        <div class="notification-title">
          {{ item.titulo }}
          <span *ngIf="!item.leida" class="unread-dot" aria-hidden="true"></span>
        </div>

        <div class="notification-message">{{ item.mensaje }}</div>
        <div class="notification-time">{{ getTiempoRelativo(item.fechaCreacion) }}</div>
      </div>
    </button>
  </ng-container>

  <ng-template #emptyState>
    <div class="notification-empty">
      <mat-icon>notifications_none</mat-icon>
      <p>No hay notificaciones por ahora.</p>
    </div>
  </ng-template>
</mat-menu>
